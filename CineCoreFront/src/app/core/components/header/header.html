<header class="header">
  <a routerLink="/" class="logo-group">
    <div class="logo-group">
      <div class="logo-icon">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="2"></rect>
          <line x1="7" y1="2" x2="7" y2="22"></line>
          <line x1="17" y1="2" x2="17" y2="22"></line>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <line x1="2" y1="7" x2="7" y2="7"></line>
          <line x1="2" y1="17" x2="7" y2="17"></line>
          <line x1="17" y1="7" x2="22" y2="7"></line>
          <line x1="17" y1="17" x2="22" y2="17"></line>
        </svg>
      </div>
      <span class="sidebar-text logo-text">CineCore</span>
    </div>
  </a>

  <nav class="nav-group">
    @if (isAuthPage) {
      <a routerLink="/how-to-use" routerLinkActive="active-link" class="nav-link">How to Use</a>
    }

    @else if (isLoggedIn) {
      @if (!isDashboardPage) {
        <a routerLink="/how-to-use" routerLinkActive="active-link" class="nav-link">How to Use</a>
      }

      @if (!idProjectsPage) {
        <button (click)="openModal()" class="btn btn-new-project">Create New Project</button>
      }

      <a routerLink="/account" class="user-profile-chip">
        <div class="user-avatar-gradient" [style.background]="avatarStyle">
          {{ userInitials }}
        </div>
        <span class="user-name-text">{{ userData?.firstName }}</span>
      </a>
    }

    @else {
      <a routerLink="/how-to-use" routerLinkActive="active-link" class="nav-link">How to Use</a>
      <a routerLink="/login" routerLinkActive="active-link" class="nav-link">Log In</a>
      <button routerLink="/signup" class="btn btn-signup">Sign Up</button>
    }
  </nav>
</header>

<app-project-modal
  [isOpen]="isModalOpen"
  (close)="closeModal()"
  (projectCreated)="onProjectCreated($event)">
</app-project-modal>
