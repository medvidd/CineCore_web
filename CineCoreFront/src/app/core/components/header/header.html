<header class="header">
  <a routerLink="/" class="logo-group">
    <div class="logo-icon"><div class="logo-inner-square"></div></div>
    <div class="logo-text">CineCore</div>
  </a>

  <nav class="nav-group">
    @if (isDashboardPage) {
      <button class="btn btn-new-project">New Project</button>
    }
    @else if (isAuthPage) {
    }
    @else {
      <a routerLink="/how-to-use" routerLinkActive="active-link" class="nav-link">How to Use</a>
      <a routerLink="/login" routerLinkActive="active-link" class="nav-link">Log In</a>
      <button routerLink="/signup" class="btn btn-signup">Sign Up</button>
    }
  </nav>
</header>
