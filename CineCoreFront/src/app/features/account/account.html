<div class="page-background">
  <div class="figma-canvas">
    <app-header></app-header>

    <main class="dashboard-layout">

      @if (userData) {
        <aside class="profile-sidebar">
          <button class="edit-btn">
            <svg viewBox="0 0 20 20" fill="none"><path d="M2.5 17.5H17.5 M5.83 14.17L14.17 5.83" stroke="currentColor" stroke-width="1.67" stroke-linecap="round"/></svg>
          </button>

          <div class="avatar-gradient">{{ userData.firstName[0] }}{{ userData.lastName[0] }}</div>

          <div class="user-info">
            <h2 class="user-name">{{ userData.firstName }} {{ userData.lastName }}</h2>
            <p class="user-email">{{ userData.email }}</p>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-value text-teal">3</span>
              <span class="stat-label">Projects</span>
            </div>
            <div class="stat-card">
              <span class="stat-value text-yellow">2</span>
              <span class="stat-label">Invitations</span>
            </div>
          </div>

          <button class="log-out-btn" (click)="logout()">
            <svg viewBox="0 0 20 20" fill="none" class="logout-icon"><path d="M7.5 17.5H4.17C3.25 17.5 2.5 16.75 2.5 15.83V4.17C2.5 3.25 3.25 2.5 4.17 2.5H7.5 M13.33 14.17L17.5 10L13.33 5.83 M17.5 10H7.5" stroke="white" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Log Out
          </button>
        </aside>
      }

      <section class="dashboard-content">

        <div class="content-block">
          <div class="block-header">
            <h2>My Projects</h2>
            <a href="#" class="see-all">See all</a>
          </div>

          <div class="projects-grid">
          </div>
        </div>

      </section>
    </main>
  </div>
</div>
