<div class="page-background">
  <div class="figma-canvas">

    <app-header></app-header>

    <main class="auth-section">
      <div class="auth-card login-card">

        <div class="card-header">
          <h1>Log In</h1>
          <p>Access your CineCore account</p>
        </div>

        <form class="auth-form" (ngSubmit)="onSubmit()">

          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              name="email"
              [(ngModel)]="credentials.email"
              class="form-control"
              placeholder="your@email.com"
              required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-with-icon">
              <input
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                [(ngModel)]="credentials.password"
                class="form-control"
                placeholder="••••••••"
                required>

              <svg (click)="togglePasswordVisibility()" class="eye-icon" viewBox="0 0 20 20" fill="none">
                <path d="M1.67 10C1.67 10 4.58 4.17 10 4.17C15.42 4.17 18.33 10 18.33 10C18.33 10 15.42 15.83 10 15.83C4.58 15.83 1.67 10 1.67 10Z" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.67"/>
              </svg>
            </div>
          </div>

          <div class="form-actions">
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>

        <div class="card-footer">
          <p>Don't have an account? <a routerLink="/signup" class="text-teal">Sign Up</a></p>
        </div>

      </div>

      <p class="terms-text">By logging in, you agree to our terms of service and privacy policy</p>
    </main>

  </div>
</div>
