<div class="page-background">
  <div class="figma-canvas">

    <app-header></app-header>

    <main class="auth-section">
      <div class="auth-card signup-card">

        <div class="card-header">
          <h1>Sign Up</h1>
          <p>Create an account to manage your film projects</p>
        </div>

        <form class="auth-form">
          <div class="form-row">
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" class="form-control" placeholder="John">
            </div>
            <div class="form-group">
              <label>Last Name *</label>
              <input type="text" class="form-control" placeholder="Doe">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email *</label>
              <input type="email" class="form-control" placeholder="your@email.com">
            </div>

            <div class="form-group">
              <label>Password *</label>
              <div class="input-with-icon">
                <input [type]="showPassword ? 'text' : 'password'" class="form-control" placeholder="Min 8 chars">
                <svg (click)="togglePasswordVisibility()" class="eye-icon" viewBox="0 0 20 20" fill="none">
                  <path d="M1.67 10C1.67 10 4.58 4.17 10 4.17C15.42 4.17 18.33 10 18.33 10C18.33 10 15.42 15.83 10 15.83C4.58 15.83 1.67 10 1.67 10Z" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.67"/>
                </svg>
              </div>
              <span class="helper-text">Use min 8 chars, numbers & symbols</span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" class="form-control" placeholder="+38 XXX XXX XXXX">
            </div>

            <div class="form-group">
              <label>Date of Birth *</label>
              <div class="date-select-group">
                <select class="form-control select-control">
                  <option value="" disabled selected>Day</option>
                  @for (day of days; track day) {
                    <option [value]="day">{{day}}</option>
                  }
                </select>

                <select class="form-control select-control">
                  <option value="" disabled selected>Month</option>
                  @for (month of months; track month.value) {
                    <option [value]="month.value">{{month.label}}</option>
                  }
                </select>

                <select class="form-control select-control">
                  <option value="" disabled selected>Year</option>
                  @for (year of years; track year) {
                    <option [value]="year">{{year}}</option>
                  }
                </select>
              </div>
            </div>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="terms">
            <label for="terms">
              I agree to the <a href="#" class="text-teal">terms of service</a> and <a href="#" class="text-teal">privacy policy</a>
            </label>
          </div>

          <button type="button" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <div class="card-footer">
          <p>Already have an account? <a routerLink="/login" class="text-teal">Log In</a></p>
        </div>

      </div>

      <p class="terms-text">* Required fields</p>
    </main>

  </div>
</div>
