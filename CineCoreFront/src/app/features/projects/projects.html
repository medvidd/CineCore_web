<div class="page-background">
  <div class="figma-canvas">
    <app-header></app-header>

    <main class="projects-layout">
      <div class="page-title-area">
        <div class="title-text">
          <h1>Projects</h1>
          <p>Manage and explore your film projects</p>
        </div>
        <button (click)="openModal()" class="btn btn-primary btn-new">Create New Project</button>
      </div>

      <div class="split-view">
        <aside class="projects-list-panel">
          <div class="filter-header">
            <span class="filter-label">Filter by crew role</span>
            <div class="filter-pills">
              @for (filter of filters; track filter) {
                <button
                  class="filter-pill"
                  [class.active]="activeFilter === filter"
                  (click)="applyFilter(filter)">
                  {{ filter }}
                </button>
              }
            </div>
          </div>

          <div class="list-scroll-area">
            @if (isLoading) {
              <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading projects...</p>
              </div>
            } @else {
              @for (project of allProjects; track project.id) {
                <app-project-list-item
                  [project]="project"
                  [isSelected]="selectedProject?.id === project.id"
                  (click)="selectProject(project)">
                </app-project-list-item>
              } @empty {
                <div class="empty-msg">No projects found.</div>
              }
            }
          </div>
        </aside>

        <section class="project-details-panel">
          @if (isLoading) {
            <div class="details-placeholder">Loading details...</div>
          } @else {
            <app-project-details
              [project]="selectedProject"
              (delete)="handleDeleteProject($event)">
            </app-project-details>
          }
        </section>
      </div>
    </main>
  </div>
</div>

<app-project-modal
  [isOpen]="isModalOpen"
  (close)="closeModal()"
  (projectCreated)="onProjectCreated($event)">
</app-project-modal>
