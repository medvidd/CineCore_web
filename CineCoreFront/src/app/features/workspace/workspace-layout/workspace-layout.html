<div class="workspace-container">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-group">
        <div class="logo-icon"><div class="logo-inner-square"></div></div>
        <div class="logo-text">CineCore</div>
      </div>

      <a routerLink="/projects" class="btn-back">← Back to Projects</a>
    </div>

    <nav class="sidebar-nav">
      <a [routerLink]="['/workspace', projectId, 'dashboard']" routerLinkActive="active-menu" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" rx="1"></rect>
          <rect x="14" y="3" width="7" height="5" rx="1"></rect>
          <rect x="14" y="12" width="7" height="9" rx="1"></rect>
          <rect x="3" y="16" width="7" height="5" rx="1"></rect>
        </svg>
        Dashboard
      </a>

      <a [routerLink]="['/workspace', projectId, 'crew']" routerLinkActive="active-menu" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        Crew
      </a>

      <a [routerLink]="['/workspace', projectId, 'script']" routerLinkActive="active-menu" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Script
      </a>

      <a [routerLink]="['/workspace', projectId, 'resources']" routerLinkActive="active-menu" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        Resources
      </a>

      <a [routerLink]="['/workspace', projectId, 'casting']" routerLinkActive="active-menu" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        Casting
      </a>

      <a [routerLink]="['/workspace', projectId, 'planner']" routerLinkActive="active-menu" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        Planner
      </a>
    </nav>
  </aside>

  <main class="main-content">

    <header class="workspace-header">
      <div class="header-title">Workspace - {{ projectName }}</div>
    </header>

    <div class="scrollable-area">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
