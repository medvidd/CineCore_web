<div class="project-card">
  <div class="card-cover">
    <span class="role-badge"
          [style.color]="roleColor"
          [style.borderColor]="roleColor + '4D'"
          [style.backgroundColor]="roleColor + 'E6'"> {{ project.role }}
    </span>
  </div>
  <div class="card-body">
    <h3>{{ project.title }}</h3>
    <p>{{ project.genre }}</p>
  </div>
</div>
