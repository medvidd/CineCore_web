@if (isOpen) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">

      <div class="modal-header">
        <div class="icon-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3AB9A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
            <line x1="7" y1="2" x2="7" y2="22"></line>
            <line x1="17" y1="2" x2="17" y2="22"></line>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <line x1="2" y1="7" x2="7" y2="7"></line>
            <line x1="2" y1="17" x2="7" y2="17"></line>
            <line x1="17" y1="17" x2="22" y2="17"></line>
            <line x1="17" y1="7" x2="22" y2="7"></line>
          </svg>
        </div>
        <div class="header-text">
          <h2>{{ mode === 'edit' ? 'Edit Project' : 'Create New Project' }}</h2>
          <p>{{ mode === 'edit' ? 'Update your project details' : 'Fill in the details to start your new film project' }}</p>
        </div>
      </div>

      <form (ngSubmit)="onSubmit()" class="modal-form">

        <div class="form-group">
          <label>Project Title</label>
          <input type="text" name="title" [(ngModel)]="formData.title" class="form-control" placeholder="Enter project title" required>
        </div>

        <div class="form-group">
          <label>Genre</label>

          @if (!isCustomGenre) {
            <select name="genreId" [(ngModel)]="formData.genreId" (change)="onGenreChange($event)" class="form-control select-control" required>
              <option value="" disabled selected>Select a genre</option>
              @for (g of dbGenres; track g.id) {
                <option [value]="g.id">{{ g.name }}</option>
              }
              <option value="custom" class="custom-option">+ Custom Genre</option>
            </select>
          } @else {
            <div class="custom-genre-row">
              <input type="text" name="customGenre" [(ngModel)]="customGenreValue" class="form-control" placeholder="e.g. Cyberpunk, Space Opera" required>
              <button type="button" class="btn-back" (click)="cancelCustomGenre()">Back</button>
            </div>
          }
        </div>

        <div class="form-group">
          <label>Estimated Start Date</label>
          <div class="date-input-wrapper" style="position: relative;">
            <input
              type="date"
              name="startDate"
              [(ngModel)]="formData.startDate"
              class="form-control"
              style="width: 100%; height: 48px; padding-right: 40px; cursor: text;"
            >
          </div>
        </div>

        <div class="form-group">
          <label>Synopsis</label>
          <textarea name="synopsis" [(ngModel)]="formData.synopsis" class="form-control" rows="4" placeholder="Brief description of your project..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn-submit">{{ mode === 'edit' ? 'Save Changes' : 'Create Project' }}</button>
        </div>

      </form>
    </div>
  </div>
}
